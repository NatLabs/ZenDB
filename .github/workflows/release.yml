name: Release

# Pushing a v*.*.* tag runs tests, publishes the Mops library,
# and builds + releases the pre-built canister WASM — all in one go.

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    publish-mops:
        name: Publish to Mops
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dfinity/setup-dfx@main
            - uses: ZenVoich/setup-mops@v1
              with:
                  mops-version: 2.8.1
                  identity-pem: ${{ secrets.MOPS_IDENTITY_PEM }}

            - name: Install dependencies
              run: mops install --lock ignore

            - name: Check mops.toml version vs release tag
              id: version_check
              run: |
                  TAG_VERSION="${GITHUB_REF_NAME#v}"
                  TOML_VERSION=$(grep '^version' mops.toml | sed 's/version = "\(.*\)"/\1/')
                  echo "Tag version:  $TAG_VERSION"
                  echo "mops.toml version: $TOML_VERSION"

                  if [ "$TOML_VERSION" = "$TAG_VERSION" ]; then
                    echo "mops.toml already at $TAG_VERSION — package was already published, skipping."
                    echo "skip=true" >> $GITHUB_OUTPUT
                  elif [ "$(printf '%s\n%s' "$TOML_VERSION" "$TAG_VERSION" | sort -V | head -1)" = "$TOML_VERSION" ]; then
                    echo "mops.toml ($TOML_VERSION) is behind tag ($TAG_VERSION) — proceeding with publish."
                    echo "skip=false" >> $GITHUB_OUTPUT
                  else
                    echo "ERROR: mops.toml version ($TOML_VERSION) is ahead of the release tag ($TAG_VERSION)."
                    exit 1
                  fi

            - name: Set version from tag in mops.toml
              if: steps.version_check.outputs.skip == 'false'
              run: sed -i "s/^version = .*/version = \"${GITHUB_REF_NAME#v}\"/" mops.toml

            - name: Commit updated mops.toml
              if: steps.version_check.outputs.skip == 'false'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add mops.toml
                  git commit -m "updated mops version to ${GITHUB_REF_NAME} [skip ci]"
                  git push origin HEAD:main

            - name: Publish
              if: steps.version_check.outputs.skip == 'false'
              run: mops publish

    release-wasm:
        name: Build and release WASM
        needs: publish-mops
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dfinity/setup-dfx@main
            - uses: ZenVoich/setup-mops@v1
              with:
                  mops-version: 2.8.1
                  identity-pem: ${{ secrets.MOPS_IDENTITY_PEM }}

            - name: Install dependencies
              run: mops install --lock ignore

            - name: Start local replica
              run: dfx start --background

            - name: Build canister WASMs
              run: |
                  for canister in zendb-canister zendb-canister-eop; do
                    dfx canister create $canister
                    dfx build $canister
                  done

            - name: Stop local replica
              run: dfx stop

            - name: Package WASMs
              run: |
                  for canister in zendb-canister zendb-canister-eop; do
                    cp .dfx/local/canisters/$canister/$canister.wasm $canister.wasm
                    gzip -k $canister.wasm
                    cp .dfx/local/canisters/$canister/$canister.did $canister.did
                  done

            - name: Extract version from tag
              id: version
              # GITHUB_REF_NAME is the full tag e.g. "v1.2.3"
              # SEMVER strips the leading "v" → "1.2.3" (for mops add / dfx.json)
              run: |
                  MOPS_VERSION="${GITHUB_REF_NAME}"
                  SEMVER="${MOPS_VERSION#v}"
                  echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
                  echo "MOPS_VERSION=$MOPS_VERSION" >> $GITHUB_OUTPUT
                  echo "SEMVER=$SEMVER" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ steps.version.outputs.MOPS_VERSION }}
                  body: |
                      ## ZenDB ${{ steps.version.outputs.MOPS_VERSION }}

                      ### Deploying the pre-built canister

                      Add to your `dfx.json`:
                      ```json
                      {
                        "type": "custom",
                        "wasm": "https://github.com/NatLabs/ZenDB/releases/download/${{ steps.version.outputs.TAG }}/zendb-canister.wasm.gz",
                        "candid": "https://github.com/NatLabs/ZenDB/releases/download/${{ steps.version.outputs.TAG }}/zendb-canister.did"
                      }
                      ```

                      ### Using as a Mops library

                      `mops add zendb@${{ steps.version.outputs.SEMVER }}`

                  files: |
                      zendb-canister.wasm
                      zendb-canister.wasm.gz
                      zendb-canister.did
                      zendb-canister-eop.wasm
                      zendb-canister-eop.wasm.gz
                      zendb-canister-eop.did
                  token: ${{ secrets.GITHUB_TOKEN }}
